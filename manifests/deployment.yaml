apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensor-view
  namespace: sensor-view
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sensor-view
  template:
    metadata:
      labels:
        app: sensor-view
    spec:
      containers:
        - name: sensor-view
          image: __REGISTRY_HOST__:5000/sensor-view:__IMAGE_TAG__
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sensor-view-secret
                  key: database-url
            - name: VIEW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sensor-view-secret
                  key: view-password
